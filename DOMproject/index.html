<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProductivityDashbord</title>
    <link rel="stylesheet" href="style.css">
    <!-- Remix Icon CDN -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
    
</head>
<body>
    <div id="main">
        <h6>Created by: Mahesh Suthar</h6>
        <nav>

        </nav>
        <section class="allElems">
            <div class="todo elem" id="0">
                <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTV8fHdhbGxwYXBlcnxlbnwwfHwwfHx8MA%3D%3D" alt="Loading img">
                <h2>To Do List</h2>
            </div>
            <div class="daily elem" id="1">
                <img src="https://plus.unsplash.com/premium_photo-1669069604807-3599ca97d845?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NTV8fGNhcmQlMjBiYWNrZ3JvdW5kfGVufDB8fDB8fHww" alt="Loading img">
                <h2>Daily Planner</h2>
            </div>
            <div class="moti elem" id="2">
                <img src="https://plus.unsplash.com/premium_photo-1667112532508-3658ca5c51d8?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NXx8Y2FyZCUyMGJhY2tncm91bmR8ZW58MHx8MHx8fDA%3D" alt="Loading img">
                <h2>Motivation</h2>
            </div>
            <div class="pomo elem" id="3">
                <img src="https://plus.unsplash.com/premium_photo-1667113478918-cfef93399991?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8OXx8Y2FyZCUyMGJhY2tncm91bmR8ZW58MHx8MHx8fDA%3D" alt="Loading img">
                <h2>Pomodoro timer</h2>
            </div>
            <div class="goals elem" id="4">
                <img src="https://images.unsplash.com/photo-1620121692029-d088224ddc74?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MjB8fHdhbGxwYXBlcnxlbnwwfHwwfHx8MA%3D%3D" alt="Loading img">
                <h2>Daily Goals</h2>
            </div>
        </section>
        <section class="fullElem toDoPage">
            <button class="back" id="0">Close</button>
            <h2>Your personalised task list</h2>
            <div class="toDoContainer">
                <div class="addTask">
                    <form>
                        <input type="text" id="taskName" class="task" placeholder="Enter task" name="task">
                        <textarea class="details" placeholder="Enter details" name="details" cols="3" rows="7"></textarea>
                        <div class="markImp">
                            <input type="checkbox" name="checkBox" id="checkBox">
                            <label for="checkBox" class="nameForCheck">Mark as important!</label>
                        </div>
                        <button>Add task</button>
                    </form>
                </div>
                <div class="allTask">
                    <!-- .taskAndDtlsCont rendered through JS -->
                 </div>
        </section>
        <section class="fullElem dailyPlanner">
            <button class="back" id="1">Close</button>
            <h2>Plan your day to be more Productive</h2>

            <div class="dayPlanner">
                <div class="dayPlannerTime">
                    <p>6:00</p>
                    <input type="text" placeholder="...">
                </div>
                <div class="dayPlannerTime">
                    <p>6:00</p>
                    <input type="text" placeholder="...">
                </div>
               
            </div>

        </section>
        <section class="fullElem motivationQuotes">
            <button class="back" id="2">Close</button>
            <h1>Motivation Quotes</h1>
        </section>
        <section class="fullElem pomodoroTimer">
            <button class="back" id="3">Close</button>
            <h1>Pomodoro Timer</h1>
        </section>
        <section class="fullElem dailyGoals">
            <button class="back" id="4">Close</button>
            <h1>Daily Goals</h1>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
